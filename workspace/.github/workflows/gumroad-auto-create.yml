name: Gumroad Auto Product Creator

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发（可选）
  # schedule:
  #   - cron: '0 1 * * *'  # 每天凌晨1点运行

jobs:
  create-products:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install playwright
        playwright install chromium
        
    - name: Run product creator
      env:
        GUMROAD_EMAIL: ${{ secrets.GUMROAD_EMAIL }}
        GUMROAD_PASSWORD: ${{ secrets.GUMROAD_PASSWORD }}
      run: |
        python scripts/gumroad_github_actions.py
        
    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: |
          *.png
        retention-days: 7
