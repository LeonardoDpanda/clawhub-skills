<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
    }
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button.connect {
      background: #007bff;
      color: white;
    }
    button.disconnect {
      background: #dc3545;
      color: white;
    }
    .info {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h3>🐾 OpenClaw Browser Relay</h3>
  <div id="status" class="status disconnected">
    Status: Disconnected
  </div>
  <button id="toggleBtn" class="connect">Attach This Tab</button>
  <div class="info">
    Connect this tab to OpenClaw for remote control.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
