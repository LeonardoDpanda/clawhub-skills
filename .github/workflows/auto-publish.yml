name: Publish Skills

on:
workflow_dispatch:

jobs:
publish:
runs-on: ubuntu-latest
steps:
- name: Publish to ClawHub
env:
TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
run: |
curl -s -X POST "https://clawhub.com/api/skills" \
-H "Authorization: Bearer $TOKEN" \
-H "Content-Type: application/json" \
-d '{"name":"password-generator","description":"Generate secure passwords","github_url":"https://github.com/LeonardoDpanda/clawhub-skills/blob/main/password-generator_SKILL.md","version":"1.0.0"}'

- name: Create Gumroad Product
env:
TOKEN: ${{ secrets.GUMROAD_TOKEN }}
run: |
curl -s -X POST "https://api.gumroad.com/v2/products" \
-H "Authorization: Bearer $TOKEN" \
-d "product[name]=Password Generator" \
-d "product[price]=400" \
-d "product[currency]=usd" \
-d "product[is_physical]=false"
