name: Publish
on: workflow_dispatch
jobs:
clawhub:
runs-on: ubuntu-latest
steps:
- name: Publish Skill
run: curl -X POST "https://clawhub.com/api/skills" -H "Authorization: Bearer ${{ secrets.CLAWHUB_TOKEN }}" -H "Content-Type: application/json" -d '{"name":"password-generator","description":"Generate secure passwords","github_url":"https://github.com/LeonardoDpanda/clawhub-skills/blob/main/password-generator_SKILL.md"}'
gumroad:
runs-on: ubuntu-latest
steps:
- name: Create Product
run: curl -X POST "https://api.gumroad.com/v2/products" -H "Authorization: Bearer ${{ secrets.GUMROAD_TOKEN }}" -d "product[name]=Password Generator" -d "product[price]=400" -d "product[currency]=usd"
